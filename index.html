<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD → PDF</title>
  <script src="vendor/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 2rem;
    }

    .drop-zone {
      border: 1.5px dashed #333;
      border-radius: 10px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #161616;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #666;
      background: #1a1a1a;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      opacity: 0.4;
    }

    .drop-label {
      font-size: 0.85rem;
      color: #666;
    }

    .drop-label span {
      color: #aaa;
      font-weight: 500;
    }

    .file-info {
      display: none;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
    }

    .file-info.visible { display: flex; }

    .file-name {
      font-size: 0.85rem;
      color: #ccc;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-size {
      font-size: 0.75rem;
      color: #555;
      flex-shrink: 0;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.75rem;
      background: #fff;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .btn:not(:disabled):hover { opacity: 0.85; }

    .status {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #555;
      text-align: center;
      min-height: 1.2em;
    }

    .status.error { color: #e05c5c; }
    .status.success { color: #5ce07a; }
  </style>
</head>
<body>

<div class="card">
  <h1>MD → PDF</h1>
  <p class="subtitle">Convertis tes fichiers Markdown en PDF</p>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".md,.markdown,text/markdown" />
    <div class="drop-icon">&#x1F4C4;</div>
    <div class="drop-label">Glisse un fichier ici ou <span>clique pour choisir</span></div>
  </div>

  <div class="file-info" id="file-info">
    <span class="file-name" id="file-name"></span>
    <span class="file-size" id="file-size"></span>
  </div>

  <button class="btn" id="convert-btn" disabled>Enregistrer en PDF</button>
  <div class="status" id="status"></div>
</div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const fileInfo = document.getElementById('file-info');
  const fileNameEl = document.getElementById('file-name');
  const fileSizeEl = document.getElementById('file-size');
  const convertBtn = document.getElementById('convert-btn');
  const statusEl = document.getElementById('status');

  let currentFile = null;

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + type;
  }

  function loadFile(file) {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['md', 'markdown'].includes(ext)) {
      setStatus('Fichier non supporté. Utilise un fichier .md', 'error');
      return;
    }
    currentFile = file;
    fileNameEl.textContent = file.name;
    fileSizeEl.textContent = formatSize(file.size);
    fileInfo.classList.add('visible');
    convertBtn.disabled = false;
    setStatus('');
  }

  fileInput.addEventListener('change', () => loadFile(fileInput.files[0]));

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    loadFile(e.dataTransfer.files[0]);
  });

  convertBtn.addEventListener('click', async () => {
    if (!currentFile) return;

    convertBtn.disabled = true;
    setStatus('Ouverture…');

    try {
      const text = await currentFile.text();
      const html = marked.parse(text);
      const baseName = currentFile.name.replace(/\.(md|markdown)$/i, '');

      const printDoc = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>${baseName}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @media print {
    @page { margin: 20mm 18mm; }
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
  body {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 15px;
    line-height: 1.7;
    color: #1a1a1a;
    max-width: 740px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  h1, h2, h3, h4, h5, h6 {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-top: 1.6em;
    margin-bottom: 0.4em;
    line-height: 1.3;
    color: #111;
  }
  h1 { font-size: 2em; border-bottom: 1px solid #e0e0e0; padding-bottom: 0.3em; }
  h2 { font-size: 1.45em; border-bottom: 1px solid #efefef; padding-bottom: 0.2em; }
  h3 { font-size: 1.15em; }
  p { margin-bottom: 0.9em; }
  a { color: #0066cc; }
  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.88em;
    background: #f4f4f4;
    padding: 0.15em 0.35em;
    border-radius: 3px;
  }
  pre {
    background: #f4f4f4;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    padding: 1em 1.2em;
    overflow-x: auto;
    margin-bottom: 1em;
    white-space: pre-wrap;
  }
  pre code { background: none; padding: 0; font-size: 0.85em; }
  blockquote {
    border-left: 3px solid #ccc;
    padding-left: 1em;
    color: #555;
    margin: 0 0 1em 0;
  }
  ul, ol { padding-left: 1.5em; margin-bottom: 0.9em; }
  li { margin-bottom: 0.25em; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
  th, td { border: 1px solid #ddd; padding: 0.5em 0.75em; text-align: left; }
  th { background: #f0f0f0; font-weight: 600; }
  img { max-width: 100%; }
  hr { border: none; border-top: 1px solid #e0e0e0; margin: 1.5em 0; }
</style>
</head>
<body>${html}</body>
</html>`;

      const win = window.open('', '_blank', 'width=900,height=700');
      if (!win) {
        setStatus('Popups bloquées — autorise-les pour ce fichier dans ton navigateur.', 'error');
        convertBtn.disabled = false;
        return;
      }
      win.document.write(printDoc);
      win.document.close();
      win.focus();
      setTimeout(() => win.print(), 400);
      setStatus('Choisis "Enregistrer en PDF" dans la boîte de dialogue.', 'success');
    } catch (err) {
      console.error(err);
      setStatus('Erreur.', 'error');
    } finally {
      convertBtn.disabled = false;
    }
  });
</script>
</body>
</html>
